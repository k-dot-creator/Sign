name: Local APK Signer

on:
  workflow_dispatch:
    inputs:
      apk_filename:
        description: 'Name of APK file in repo root'
        required: true
        default: 'robbie.apk'
      keystore_filename:
        description: 'Name of keystore file in repo root'
        required: true
        default: 'my-release-key.keystore'
      keystore_password:
        description: 'Keystore password'
        required: true
      key_alias:
        description: 'Key alias'
        required: true
      key_password:
        description: 'Key password (if different from keystore)'
        required: false

jobs:
  sign-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Verify files exist
      run: |
        if [ ! -f "${{ github.event.inputs.apk_filename }}" ]; then
          echo "❌ APK file not found: ${{ github.event.inputs.apk_filename }}"
          exit 1
        fi
        if [ ! -f "${{ github.event.inputs.keystore_filename }}" ]; then
          echo "❌ Keystore file not found: ${{ github.event.inputs.keystore_filename }}"
          exit 1
        fi
        echo "✅ All files found"
        
    - name: Sign APK
      run: |
        OUTPUT_APK="signed-$(basename "${{ github.event.inputs.apk_filename }}" .apk)-$(date +%Y%m%d-%H%M%S).apk"
        echo "OUTPUT_APK=$OUTPUT_APK" >> $GITHUB_ENV
        
        jarsigner -verbose \
          -sigalg SHA1withRSA \
          -digestalg SHA1 \
          -keystore "${{ github.event.inputs.keystore_filename }}" \
          -storepass "${{ github.event.inputs.keystore_password }}" \
          -keypass "${{ github.event.inputs.key_password || github.event.inputs.keystore_password }}" \
          -signedjar "$OUTPUT_APK" \
          "${{ github.event.inputs.apk_filename }}" \
          "${{ github.event.inputs.key_alias }}"
          
        echo "✅ APK signed successfully"
        
    - name: Prepare deployment
      run: |
        mkdir -p public
        cp ${{ env.OUTPUT_APK }} public/
        cp download-page.html public/index.html
        
        # Generate file info
        echo "{
          \"filename\": \"${{ env.OUTPUT_APK }}\",
          \"size\": \"$(du -h ${{ env.OUTPUT_APK }} | cut -f1)\",
          \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
          \"alias\": \"${{ github.event.inputs.key_alias }}\",
          \"sha256\": \"$(sha256sum ${{ env.OUTPUT_APK }} | cut -d' ' -f1)\",
          \"run_id\": \"${{ github.run_id }}\"
        }" > public/info.json
        
    - name: Generate QR code
      run: |
        sudo apt install -y qrencode
        DOWNLOAD_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ env.OUTPUT_APK }}"
        qrencode -o public/qr.png -s 10 "$DOWNLOAD_URL"
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        enable_jekyll: false
        publish_branch: gh-pages
        
    - name: Display URLs
      run: |
        echo "================================================"
        echo "✅ APK SIGNED SUCCESSFULLY!"
        echo "================================================"
        echo "📱 Download Page:"
        echo "   https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
        echo ""
        echo "🔗 Direct APK Link:"
        echo "   https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ env.OUTPUT_APK }}"
        echo "================================================"
